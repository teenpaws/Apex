# Production Apex stack
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   cp backend/.env.prod.example backend/.env.prod   # fill in real values
#   MOCK_AGENTS=false and USE_MOCK_DATA=false in .env.prod

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env.prod
    environment:
      - ENVIRONMENT=production
      - JSON_LOGS=true
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.core.celery_app worker
      -Q high,default,low
      --loglevel=info
      --concurrency=2
    restart: unless-stopped
    env_file: ./backend/.env.prod
    environment:
      - ENVIRONMENT=production
      - JSON_LOGS=true
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file: ./backend/.env.prod
    environment:
      - ENVIRONMENT=production
      - JSON_LOGS=true
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api/v1
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  redis_data:
